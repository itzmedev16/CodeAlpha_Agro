<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,inital-scale=0.1">
        <title>Cart🛒</title>
        <link rel="stylesheet" href="../css/cart.css">
    </head>
    <body>
        <nav class="cart-nav">
            <h1><a href="../index.html" class="logo">Agro</a></h1>
        </nav>
    <div class="cart-page">
    <h1 class="shopping">Shopping Cart</h1>
    <div class="cart-layout">
        <div class="cart-container">
             <h2>Your Cart</h2>       
             <div id="cart-items"></div>
        </div>
        <div class="cart-right">
            <p>Total:</p>
            <h2>₹<span id="total">0</span></h2>
            <button class="checkout-btn" onclick="checkout(0)">Proceed to Checkout</button>
        </div>
    </div>
    <p id="empty-msg" style="display:none;">Your cart is empty</p>
</div>
        <script src="../js/cart.js"></script>
        <div id="popup" class="popup">
            <div class="popup-content">
                <div id="popup-icon">✔</div>
                    <h2 id="popup-msg">Message</h2>
                        <button onclick="closePopup()">OK</button>
            </div>
        </div>
    </body>
</html>
